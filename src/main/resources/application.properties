spring.application.name=assignment

# PostgreSQL configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/clothing_store
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate: auto-creates/updates tables from JPA entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server configuration
server.port=8443
server.address=0.0.0.0

# SSL configuration
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=password
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=springboot

# JWT configuration
app.jwt.secret=======================VanesClothingStoreSecretKey======================
app.jwt.expirationMs=1800000

# MongoDB configuration for Real-Time Chat
spring.data.mongodb.uri=mongodb://localhost:27017/clothing_store_chat

