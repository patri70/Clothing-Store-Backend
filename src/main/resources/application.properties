spring.application.name=assignment

# PostgreSQL configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/clothing_store}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate: auto-creates/updates tables from JPA entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server configuration
server.port=${PORT:8443}
server.address=0.0.0.0

# SSL configuration
server.ssl.enabled=${SSL_ENABLED:true}
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=password
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=springboot

# JWT configuration
app.jwt.secret=======================VanesClothingStoreSecretKey======================
app.jwt.expirationMs=1800000

# MongoDB configuration for Real-Time Chat
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/clothing_store_chat}
